version: '3.8'

services:
  homeassistant:
    container_name: homeassistant-test
    image: ghcr.io/home-assistant/home-assistant:stable
    volumes:
      - ./config:/config
      - ./custom_components:/config/custom_components
    ports:
      - "8123:8123"
    environment:
      - TZ=Europe/Warsaw
    restart: unless-stopped
